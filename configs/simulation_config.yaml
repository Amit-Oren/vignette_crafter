simulation:
  num_patients: 46
  patient_ids: []   # e.g. [23] or [23, 45] — overrides num_patients if set
  seed: 42
  max_retries: 2
  temperature: 0.7
  pipeline: vignette_full
  persona_context: true   # use demographics + self-report in vignette crafter
  use_formulation: true   # include edges/nodes in vignette crafter (false = demographics only)
  self_report_items: 3    # self-report items selected per active node

models:
  vignette_crafter: llama3.1-70b
  validator: llama3.1-70b
  persona_validator: llama3.1-70b
  persona_crafter: llama3.1-70b

# ── Available models ──────────────────────────────────────────────────────────
# OpenAI
#   gpt-5.4-mini
#   gpt-5.4
#
# Anthropic
#   claude-3-opus
#   claude-3-sonnet
#
# DeepSeek  (requires DEEPSEEK_API_KEY in .env)
#   llama3.1-70b
#   deepseek-reasoner
#
# Lab / Tailscale  (requires Tailscale connection)
#   llama3.1-8b
#   llama3.1-70b
#   qwen2.5-32b
